# ObsidianWatch Management Platform — Runtime Config
# Edit this file then restart: sudo docker compose restart mgmt-api

server:
  listen_addr: ":8080"
  read_timeout:  "30s"
  write_timeout: "30s"
  cors_origins:
    - "*"   # tighten to http://192.168.1.140 in production

database:
  host:     "timescaledb"      # Docker service name — do not change
  port:     5432
  name:     "obsidianwatch"
  user:     "obsidianwatch"
  password: "changeme"         # ← MUST match agent backend POSTGRES_PASSWORD
  ssl_mode: "disable"
  max_open_conns:    10
  max_idle_conns:    5
  conn_max_lifetime: "5m"

auth:
  # Generate with: openssl rand -hex 32
  jwt_secret:     "changeme-generate-with-openssl-rand-hex-32"
  token_duration: "24h"

# ── Email Alerts (optional) ───────────────────────────────────────────────────
# Set enabled: true and fill in your SMTP details to receive email alerts.
# Supports Gmail, Office 365, SendGrid, or any SMTP relay.
smtp:
  enabled:      false
  host:         "smtp.gmail.com"       # e.g. smtp.gmail.com / smtp.office365.com
  port:         587
  username:     "you@gmail.com"
  password:     "your-app-password"    # Gmail: use App Password, not account password
  from:         "ObsidianWatch <you@gmail.com>"
  to:
    - "security-team@yourcompany.com"
    # - "soc@yourcompany.com"          # add more recipients here
  min_severity: 4                      # 1=info 2=low 3=medium 4=high 5=critical
  use_tls:      true

log:
  level:  "info"
  format: "json"
