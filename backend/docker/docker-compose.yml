# OpenSIEM Management Platform
# Runs alongside the agent backend on the same server
# Connects to the existing opensiem-db via the backend's Docker network

services:

  mgmt-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: opensiem-mgmt-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./server.yaml:/app/server.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - mgmt
      - backend

  mgmt-ui:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: opensiem-mgmt-ui
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      mgmt-api:
        condition: service_healthy
    networks:
      - mgmt

networks:
  mgmt:
    driver: bridge
  backend:
    external: true
    name: docker_default
