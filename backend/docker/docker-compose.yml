# ObsidianWatch Management Platform
# Requires the backend stack (Obsidianwatch-Backend) to be running first.
# Both stacks share the 'obsidianwatch' Docker network for DB access.

services:

  mgmt-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: obsidianwatch-mgmt-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./server.yaml:/app/server.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - mgmt
      - obsidianwatch   # join backend network to reach timescaledb

  mgmt-ui:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: obsidianwatch-mgmt-ui
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      mgmt-api:
        condition: service_healthy
    networks:
      - mgmt

networks:
  mgmt:
    driver: bridge
  obsidianwatch:
    external: true   # created by the backend stack — must exist first
    name: obsidianwatch
