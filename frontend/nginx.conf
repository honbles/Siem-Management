server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA — all non-asset routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Live Response agent tunnel — WebSocket, must come before /api/ block
    location /api/v1/live-response/agent-tunnel {
        proxy_pass http://mgmt-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-API-Key $http_x_api_key;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Live Response terminal — WebSocket for analyst SSH/RDP session
    location /api/v1/live-response/terminal {
        proxy_pass http://mgmt-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }

    # Proxy API requests to the Go backend
    location /api/ {
        proxy_pass http://mgmt-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-API-Key $http_x_api_key;
    }

    location /auth/ {
        proxy_pass http://mgmt-api:8080;
        proxy_set_header Host $host;
    }

    # WebSocket proxy for event stream
    location /ws/ {
        proxy_pass http://mgmt-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location /health {
        proxy_pass http://mgmt-api:8080;
    }
}
