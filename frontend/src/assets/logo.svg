<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220">
  <defs>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lensGrad" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#1a3a4a"/>
      <stop offset="60%" stop-color="#0a1a22"/>
      <stop offset="100%" stop-color="#040e14"/>
    </radialGradient>
    <radialGradient id="irisGrad" cx="40%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#1e5a6e"/>
      <stop offset="50%" stop-color="#0d3040"/>
      <stop offset="100%" stop-color="#061820"/>
    </radialGradient>
    <radialGradient id="pupilGrad" cx="42%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#0088aa"/>
      <stop offset="100%" stop-color="#003344"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer glow -->
  <circle cx="110" cy="110" r="95" fill="url(#glowGrad)"/>

  <!-- Hex body -->
  <polygon points="110,12 193,59 193,161 110,208 27,161 27,59"
    fill="#06111a" stroke="#1a3a4a" stroke-width="1.5"/>
  <polygon points="110,22 183,65 183,155 110,198 37,155 37,65"
    fill="none" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- Lens -->
  <circle cx="110" cy="108" r="62" fill="url(#lensGrad)" filter="url(#glow)"/>
  <circle cx="110" cy="108" r="62" fill="none" stroke="#00d4ff" stroke-width="1.2" stroke-opacity="0.6"/>

  <!-- Obsidian facet lines -->
  <line x1="110" y1="46" x2="60" y2="152" stroke="#1a3a4a" stroke-width="0.8" stroke-opacity="0.6"/>
  <line x1="110" y1="46" x2="160" y2="152" stroke="#1a3a4a" stroke-width="0.8" stroke-opacity="0.6"/>
  <line x1="48" y1="108" x2="172" y2="108" stroke="#1a3a4a" stroke-width="0.8" stroke-opacity="0.4"/>

  <!-- Iris -->
  <circle cx="110" cy="108" r="42" fill="url(#irisGrad)"/>
  <circle cx="110" cy="108" r="42" fill="none" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.5"/>
  <circle cx="110" cy="108" r="36" fill="none" stroke="#00d4ff" stroke-width="0.4" stroke-opacity="0.2" stroke-dasharray="3 4"/>
  <circle cx="110" cy="108" r="30" fill="none" stroke="#00d4ff" stroke-width="0.3" stroke-opacity="0.15"/>

  <!-- Pupil -->
  <circle cx="110" cy="108" r="22" fill="url(#pupilGrad)" filter="url(#softglow)"/>
  <circle cx="110" cy="108" r="22" fill="none" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.8"/>
  <circle cx="110" cy="108" r="10" fill="#001822"/>
  <circle cx="110" cy="108" r="10" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.9"/>

  <!-- Highlight -->
  <ellipse cx="96" cy="92" rx="9" ry="6" fill="white" fill-opacity="0.08" transform="rotate(-30 96 92)"/>
  <ellipse cx="93" cy="90" rx="4" ry="2.5" fill="white" fill-opacity="0.12" transform="rotate(-30 93 90)"/>

  <!-- Scan lines -->
  <line x1="72" y1="62" x2="148" y2="62" stroke="#00d4ff" stroke-width="0.6" stroke-opacity="0.3"/>
  <line x1="72" y1="154" x2="148" y2="154" stroke="#00d4ff" stroke-width="0.6" stroke-opacity="0.3"/>

  <!-- Corner ticks -->
  <line x1="44" y1="78" x2="50" y2="88" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="176" y1="78" x2="170" y2="88" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="44" y1="138" x2="50" y2="128" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="176" y1="138" x2="170" y2="128" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.4"/>
</svg>
